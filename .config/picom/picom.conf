#################################
# Backend
#################################

backend = "glx";
vsync = true;

#################################
# Shadows
#################################

shadow = true;
shadow-radius = 15;
shadow-offset-x = -10;
shadow-offset-y = -10;
shadow-opacity = 0.30;

shadow-exclude = [
 "class_g = 'Polybar'",
 "class_g = 'Rofi'",
 "class_g = 'Dunst'",
 "window_type = 'dock'",
 "window_type = 'desktop'"
];

#################################
# Fading
#################################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 5;

#################################
# Transparency
#################################

inactive-opacity = 1.0;
active-opacity = 1.0;

opacity-rule = [
 "92:class_g = 'Alacritty'",
 "95:class_g = 'Rofi'"
];

#################################
# Corners
#################################

corner-radius = 6;

rounded-corners-exclude = [
 "class_g = 'Polybar'"
];

#################################
# Focus
#################################

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-client-opacity = true;

#################################
# Window Types
#################################

wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; };
  dock = { shadow = false; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 0.95; };
};
